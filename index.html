<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ფსიქოლოგიის ტესტი - მენიუ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f1a;
        --surface: #151827;
        --card: #1c2035;
        --border: #2a3050;
        --accent: #6c8bff;
        --correct: #22c55e;
        --wrong: #ef4444;
        --text: #e8eaf6;
        --muted: #7b82a8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Noto Sans Georgian", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 700px;
        background: var(--surface);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      /* Menu Styles */
      .menu-screen h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 1.8rem;
      }
      .menu-grid {
        display: grid;
        gap: 15px;
      }
      .menu-btn {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 20px;
        border-radius: 12px;
        cursor: pointer;
        text-align: left;
        transition: all 0.3s;
      }
      .menu-btn:hover {
        border-color: var(--accent);
        background: rgba(108, 139, 255, 0.1);
      }
      .menu-btn h3 {
        margin-bottom: 5px;
        color: var(--accent);
      }

      /* Quiz Styles */
      .header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .question-text {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 25px;
        line-height: 1.5;
      }
      .options-grid {
        display: grid;
        gap: 12px;
      }
      .option {
        background: var(--card);
        border: 2px solid var(--border);
        padding: 15px 20px;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.2s;
      }
      .option.selected {
        border-color: var(--accent);
        background: rgba(108, 139, 255, 0.1);
      }
      .option.correct {
        border-color: var(--correct);
        background: rgba(34, 197, 94, 0.2);
      }
      .option.wrong {
        border-color: var(--wrong);
        background: rgba(239, 68, 68, 0.2);
      }
      .checkbox {
        width: 20px;
        height: 20px;
        border: 2px solid var(--muted);
        border-radius: 4px;
      }
      .selected .checkbox {
        background: var(--accent);
        border-color: var(--accent);
      }

      .btn-container {
        margin-top: 30px;
      }
      button.main-btn {
        width: 100%;
        padding: 15px;
        border-radius: 12px;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .explain {
        margin-top: 15px;
        padding: 15px;
        background: rgba(108, 139, 255, 0.05);
        border-left: 4px solid var(--accent);
        border-radius: 4px;
        font-size: 0.95rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="menu-ui" class="menu-screen">
        <h1>ფსიქოლოგიის ტესტი</h1>
        <div class="menu-grid">
          <button class="menu-btn" onclick="startQuiz('all')">
            <h3>სრული ტესტი</h3>
            <p>250-ვე კითხვა ერთად</p>
          </button>
          <button class="menu-btn" onclick="startQuiz('group1')">
            <h3>ჯგუფი 1</h3>
            <p>კითხვები: 1 - 40</p>
          </button>
          <button class="menu-btn" onclick="startQuiz('group2')">
            <h3>ჯგუფი 2</h3>
            <p>კითხვები: 41 - 80</p>
          </button>
          <button class="menu-btn" onclick="startQuiz('group3')">
            <h3>ჯგუფი 3</h3>
            <p>კითხვები: 81 - 120</p>
          </button>
          <button class="menu-btn" onclick="startQuiz('group4')">
            <h3>ჯგუფი 4</h3>
            <p>კითხვები: 81 - 120</p>
          </button>
          <button class="menu-btn" onclick="startQuiz('group5')">
            <h3>ჯგუფი 5</h3>
            <p>კითხვები: 160 - 200</p>
          </button>
          <button class="menu-btn" onclick="startQuiz('group6')">
            <h3>ჯგუფი 6</h3>
            <p>კითხვები: 200 - 240</p>
          </button>
          <button class="menu-btn" onclick="startQuiz('group7')">
            <h3>ჯგუფი 7</h3>
            <p>კითხვები: 240 - 250</p>
          </button>
        </div>
      </div>

      <div id="quiz-ui" style="display: none">
        <div class="header">
          <span id="progress"></span>
          <span id="score">ქულა: 0</span>
        </div>
        <div class="question-text" id="q-text"></div>
        <div class="options-grid" id="options-box"></div>
        <div id="explanation-box" class="explain"></div>
        <div class="btn-container">
          <button
            id="action-btn"
            class="main-btn"
            onclick="handleAction()"
            disabled
          >
            აირჩიეთ პასუხი
          </button>
        </div>
      </div>

      <div id="result-ui" style="display: none; text-align: center">
        <h2 style="font-size: 2rem; margin-bottom: 10px">ტესტი დასრულდა!</h2>
        <p id="final-stats" style="font-size: 1.2rem; color: var(--muted)"></p>
        <button
          class="main-btn"
          onclick="location.reload()"
          style="margin-top: 30px"
        >
          მთავარ მენიუში დაბრუნება
        </button>
      </div>
    </div>

    <script>
      let fullDatabase = [];
      let activeQuestions = [];
      let currentIdx = 0;
      let points = 0;
      let selectedIndices = [];
      let isChecked = false;

      // 1. მონაცემების ჩატვირთვა
      async function loadData() {
        try {
          const response = await fetch("questions.json");
          fullDatabase = await response.json();
        } catch (e) {
          alert("შეცდომა: questions.json ფაილი ვერ მოიძებნა!");
        }
      }

      // 2. ტესტის დაწყება რეჟიმის მიხედვით
      function startQuiz(mode) {
        if (fullDatabase.length === 0) return;

        if (mode === "all") {
          activeQuestions = [...fullDatabase];
        } else if (mode === "group1") {
          activeQuestions = fullDatabase.slice(0, 40);
        } else if (mode === "group2") {
          activeQuestions = fullDatabase.slice(40, 80);
        } else if (mode === "group3") {
          activeQuestions = fullDatabase.slice(80, 120);
        } else if (mode === "group4") {
          activeQuestions = fullDatabase.slice(120, 160);
        } else if (mode === "group5") {
          activeQuestions = fullDatabase.slice(160, 200);
        } else if (mode === "group6") {
          activeQuestions = fullDatabase.slice(200, 240);
        } else if (mode === "group7") {
          activeQuestions = fullDatabase.slice(240, 250);
        }

        document.getElementById("menu-ui").style.display = "none";
        document.getElementById("quiz-ui").style.display = "block";
        renderQuestion();
      }

      function renderQuestion() {
        const data = activeQuestions[currentIdx];
        isChecked = false;
        selectedIndices = [];

        document.getElementById("progress").innerText =
          `კითხვა: ${currentIdx + 1}/${activeQuestions.length}`;
        document.getElementById("q-text").innerText = data.q;
        document.getElementById("explanation-box").style.display = "none";

        const actionBtn = document.getElementById("action-btn");
        actionBtn.innerText = "შემოწმება";
        actionBtn.disabled = true;

        const box = document.getElementById("options-box");
        box.innerHTML = "";

        data.options.forEach((opt, i) => {
          const div = document.createElement("div");
          div.className = "option";
          div.innerHTML = `<div class="checkbox"></div> <span>${opt}</span>`;
          div.onclick = () => selectOption(i);
          box.appendChild(div);
        });
      }

      function selectOption(idx) {
        if (isChecked) return;
        const data = activeQuestions[currentIdx];
        const isMulti = data.correct.length > 1;

        if (isMulti) {
          const foundAt = selectedIndices.indexOf(idx);
          if (foundAt > -1) selectedIndices.splice(foundAt, 1);
          else selectedIndices.push(idx);
        } else {
          selectedIndices = [idx];
        }

        document.querySelectorAll(".option").forEach((opt, i) => {
          opt.classList.toggle("selected", selectedIndices.includes(i));
        });
        document.getElementById("action-btn").disabled =
          selectedIndices.length === 0;
      }

      function handleAction() {
        if (!isChecked) checkAnswer();
        else nextQuestion();
      }

      function checkAnswer() {
        isChecked = true;
        const data = activeQuestions[currentIdx];
        const options = document.querySelectorAll(".option");

        const selectedTexts = selectedIndices
          .map((i) => data.options[i])
          .sort();
        const correctTexts = [...data.correct].sort();

        const isCorrect =
          JSON.stringify(selectedTexts) === JSON.stringify(correctTexts);
        if (isCorrect) points++;

        options.forEach((opt, i) => {
          const txt = data.options[i];
          opt.classList.remove("selected");
          if (data.correct.includes(txt)) opt.classList.add("correct");
          else if (selectedIndices.includes(i)) opt.classList.add("wrong");
        });

        document.getElementById("score").innerText = `ქულა: ${points}`;
        const expBox = document.getElementById("explanation-box");
        expBox.innerText = data.explain;
        expBox.style.display = "block";
        document.getElementById("action-btn").innerText = "შემდეგი კითხვა";
      }

      function nextQuestion() {
        currentIdx++;
        if (currentIdx < activeQuestions.length) renderQuestion();
        else showResults();
      }

      function showResults() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result-ui").style.display = "block";
        document.getElementById("final-stats").innerText =
          `თქვენ დააგროვეთ ${points} ქულა ${activeQuestions.length}-დან.`;
      }

      loadData();
    </script>
  </body>
</html>

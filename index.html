
<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფსიქოლოგიის ტესტების ბაზა</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --correct: #22c55e;
            --wrong: #ef4444;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }
        body { font-family: 'Noto Sans Georgian', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: 0.3s; font-weight: bold; }
        .btn-menu { background: var(--card); color: var(--text); border: 1px solid var(--accent); }
        .btn-menu:hover { background: var(--accent); color: var(--bg); }
        .quiz-container { display: none; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.9rem; color: var(--muted); }
        .timer { color: var(--accent); font-weight: bold; }
        .question-text { font-size: 1.25rem; margin-bottom: 25px; line-height: 1.5; }
        .options-grid { display: grid; gap: 12px; }
        .option-btn { background: #334155; color: var(--text); border: 1px solid #475569; text-align: left; }
        .option-btn:hover { background: #475569; }
        .option-btn.correct-choice { background: var(--correct) !important; color: white; border-color: var(--correct); }
        .option-btn.wrong-choice { background: var(--wrong) !important; color: white; border-color: var(--wrong); }
        .nav-controls { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        .btn-nav { background: #475569; color: white; flex: 1; }
        .btn-skip { background: #64748b; }
        .btn-explain { background: #0ea5e9; margin-top: 15px; width: 100%; display: none; }
        .explanation-box { display: none; margin-top: 15px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); border-radius: 4px; }
        #results-screen { display: none; text-align: center; background: var(--card); padding: 40px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-menu">
            <div class="header">
                <h1>ფსიქოლოგიის ტესტების ბაზა</h1>
                <p>აირჩიეთ კითხვების რაოდენობა ან კონკრეტული ჯგუფი</p>
            </div>
            <div class="menu-grid">
                <button class="btn btn-menu" onclick="startQuiz(250)">ყველა (250 კითხვა)</button>
            </div>
            <div class="menu-grid" id="groups-grid"></div>
        </div>

        <div id="quiz-container" class="quiz-container">
            <div class="stats">
                <span id="progress-text">კითხვა 1 / 250</span>
                <span class="timer">დრო: <span id="time-display">00:00</span></span>
            </div>
            <div id="question-text" class="question-text"></div>
            <div id="options-container" class="options-grid"></div>
            
            <button id="explain-btn" class="btn btn-explain" onclick="toggleExplanation()">💡 ახსნა</button>
            <div id="explanation-box" class="explanation-box"></div>

            <div class="nav-controls">
                <button class="btn btn-nav" onclick="prevQuestion()">წინა</button>
                <button class="btn btn-nav btn-skip" onclick="nextQuestion()">გამოტოვება</button>
                <button class="btn btn-nav" onclick="nextQuestion()">შემდეგი</button>
            </div>
            <button class="btn btn-menu" style="width:100%; margin-top:20px;" onclick="saveProgress()">შენახვა</button>
        </div>

        <div id="results-screen">
            <h2>ტესტი დასრულდა!</h2>
            <p id="final-score" style="font-size: 2rem; margin: 20px 0;"></p>
            <button class="btn btn-menu" onclick="location.reload()">თავიდან დაწყება</button>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let currentQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let seconds = 0;
        let timerInterval;
        let userAnswers = {};

        async function loadData() {
            try {
                const response = await fetch('questions_250.json');
                allQuestions = await response.json();
                createGroups();
                loadSavedProgress();
            } catch (e) { console.error("Data load failed", e); }
        }

        function createGroups() {
            const grid = document.getElementById('groups-grid');
            const groupSize = 40;
            const numGroups = Math.ceil(allQuestions.length / groupSize);
            for (let i = 0; i < numGroups; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn btn-menu';
                btn.innerText = `ჯგუფი ${i + 1}`;
                btn.onclick = () => startQuiz(groupSize, i * groupSize);
                grid.appendChild(btn);
            }
        }

        function startQuiz(limit, start = 0) {
            currentQuestions = allQuestions.slice(start, start + limit);
            currentIdx = 0;
            score = 0;
            seconds = 0;
            userAnswers = {};
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            startTimer();
            showQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('time-display').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function showQuestion() {
            const q = currentQuestions[currentIdx];
            document.getElementById('progress-text').innerText = `კითხვა ${currentIdx + 1} / ${currentQuestions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('explanation-box').innerText = q.explain;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('explain-btn').style.display = 'none';

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn option-btn';
                btn.innerText = opt;
                
                // If already answered
                if (userAnswers[currentIdx]) {
                    highlightAnswer(btn, opt, q.correct);
                }

                btn.onclick = () => {
                    if (!userAnswers[currentIdx]) {
                        userAnswers[currentIdx] = opt;
                        highlightAnswer(btn, opt, q.correct);
                        if (opt === q.correct) score++;
                        document.getElementById('explain-btn').style.display = 'block';
                    }
                };
                container.appendChild(btn);
            });
            
            if (userAnswers[currentIdx]) {
                document.getElementById('explain-btn').style.display = 'block';
            }
        }

        function highlightAnswer(btn, selected, correct) {
            if (selected === correct) {
                btn.classList.add('correct-choice');
            } else if (userAnswers[currentIdx] === selected) {
                btn.classList.add('wrong-choice');
                // Also highlight correct one if wrong was picked
                Array.from(document.getElementsByClassName('option-btn')).forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct-choice');
                });
            }
        }

        function toggleExplanation() {
            const box = document.getElementById('explanation-box');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        function nextQuestion() {
            if (currentIdx < currentQuestions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                showQuestion();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `შენი შედეგი: ${score} / ${currentQuestions.length}`;
        }

        function saveProgress() {
            const state = {
                currentIdx,
                currentQuestions,
                userAnswers,
                seconds,
                score
            };
            localStorage.setItem('psych_quiz_save', JSON.stringify(state));
            alert('პროგრესი შენახულია!');
        }

        function loadSavedProgress() {
            const saved = localStorage.getItem('psych_quiz_save');
            if (saved && confirm('გსურთ შენახული პროგრესის გაგრძელება?')) {
                const data = JSON.parse(saved);
                currentQuestions = data.currentQuestions;
                currentIdx = data.currentIdx;
                userAnswers = data.userAnswers;
                seconds = data.seconds;
                score = data.score;
                document.getElementById('start-menu').style.display = 'none';
                document.getElementById('quiz-container').style.display = 'block';
                startTimer();
                showQuestion();
            }
        }

        loadData();
    </script>
</body>
</html>

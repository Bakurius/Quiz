<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ფსიქოლოგიის ტესტი - პროგრესის შენახვით</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f1a;
        --surface: #151827;
        --card: #1c2035;
        --border: #2a3050;
        --accent: #6c8bff;
        --correct: #22c55e;
        --wrong: #ef4444;
        --text: #e8eaf6;
        --muted: #7b82a8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Noto Sans Georgian", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 750px;
        background: var(--surface);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      /* Menu Styles */
      .menu-screen h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 1.8rem;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .full-width {
        grid-column: span 2;
      }
      .menu-btn {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 15px;
        border-radius: 12px;
        cursor: pointer;
        text-align: center;
        transition: 0.3s;
        position: relative;
      }
      .menu-btn:hover {
        border-color: var(--accent);
        background: rgba(108, 139, 255, 0.1);
      }
      .menu-btn h3 {
        margin-bottom: 5px;
        color: var(--accent);
        font-size: 1rem;
      }
      .saved-score {
        font-size: 0.8rem;
        color: var(--correct);
        font-weight: 600;
        margin-top: 5px;
      }

      /* Quiz UI */
      .header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 600;
      }
      .score-box {
        color: var(--accent);
      }
      .question-text {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 25px;
        line-height: 1.5;
        min-height: 60px;
      }
      .options-grid {
        display: grid;
        gap: 10px;
      }
      .option {
        background: var(--card);
        border: 2px solid var(--border);
        padding: 14px 18px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.2s;
      }
      .option.selected {
        border-color: var(--accent);
        background: rgba(108, 139, 255, 0.08);
      }
      .option.correct {
        border-color: var(--correct);
        background: rgba(34, 197, 94, 0.15);
      }
      .option.wrong {
        border-color: var(--wrong);
        background: rgba(239, 68, 68, 0.15);
      }

      .checkbox {
        width: 18px;
        height: 18px;
        border: 2px solid var(--muted);
        border-radius: 4px;
        flex-shrink: 0;
      }
      .selected .checkbox {
        background: var(--accent);
        border-color: var(--accent);
      }

      .btn-container {
        margin-top: 25px;
        display: flex;
        gap: 10px;
      }
      button.main-btn {
        flex: 2;
        padding: 14px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
      }
      button.secondary-btn {
        flex: 1;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .explain {
        margin-top: 15px;
        padding: 15px;
        background: rgba(108, 139, 255, 0.05);
        border-left: 4px solid var(--accent);
        border-radius: 4px;
        font-size: 0.9rem;
        display: none;
        line-height: 1.4;
      }

      @media (max-width: 500px) {
        .menu-grid {
          grid-template-columns: 1fr;
        }
        .full-width {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="menu-ui" class="menu-screen">
        <h1>ფსიქოლოგიის ტესტი</h1>
        <div class="menu-grid">
          <button
            class="menu-btn full-width"
            onclick="startQuiz(0, 250, 'all')"
          >
            <h3>სრული ტესტი</h3>
            <p>1 - 250 კითხვა</p>
            <div id="score-all" class="saved-score"></div>
          </button>
          <button class="menu-btn" onclick="startQuiz(0, 40, 'g1')">
            <h3>ჯგუფი 1</h3>
            <p>1 - 40</p>
            <div id="score-g1" class="saved-score"></div>
          </button>
          <button class="menu-btn" onclick="startQuiz(40, 80, 'g2')">
            <h3>ჯგუფი 2</h3>
            <p>41 - 80</p>
            <div id="score-g2" class="saved-score"></div>
          </button>
          <button class="menu-btn" onclick="startQuiz(80, 120, 'g3')">
            <h3>ჯგუფი 3</h3>
            <p>81 - 120</p>
            <div id="score-g3" class="saved-score"></div>
          </button>
          <button class="menu-btn" onclick="startQuiz(120, 160, 'g4')">
            <h3>ჯგუფი 4</h3>
            <p>121 - 160</p>
            <div id="score-g4" class="saved-score"></div>
          </button>
          <button class="menu-btn" onclick="startQuiz(160, 200, 'g5')">
            <h3>ჯგუფი 5</h3>
            <p>161 - 200</p>
            <div id="score-g5" class="saved-score"></div>
          </button>
          <button class="menu-btn" onclick="startQuiz(200, 240, 'g6')">
            <h3>ჯგუფი 6</h3>
            <p>201 - 240</p>
            <div id="score-g6" class="saved-score"></div>
          </button>
          <button class="menu-btn" onclick="startQuiz(240, 250, 'g7')">
            <h3>ჯგუფი 7</h3>
            <p>241 - 250</p>
            <div id="score-g7" class="saved-score"></div>
          </button>
        </div>
      </div>

      <div id="quiz-ui" style="display: none">
        <div class="header">
          <span id="local-progress"></span>
          <span class="score-box"
            >ქულა: <span id="current-points">0</span></span
          >
          <span id="global-progress"></span>
        </div>
        <div class="question-text" id="q-text"></div>
        <div class="options-grid" id="options-box"></div>
        <div id="explanation-box" class="explain"></div>
        <div class="btn-container">
          <button
            id="prev-btn"
            class="secondary-btn"
            onclick="prevQuestion()"
            style="display: none"
          >
            უკან
          </button>
          <button
            id="action-btn"
            class="main-btn"
            onclick="handleAction()"
            disabled
          >
            შემოწმება
          </button>
        </div>
      </div>

      <div id="result-ui" style="display: none; text-align: center">
        <h2 style="font-size: 1.8rem; margin-bottom: 10px">ტესტი დასრულდა!</h2>
        <p
          id="final-stats"
          style="font-size: 1.1rem; color: var(--muted); margin-bottom: 25px"
        ></p>
        <button class="main-btn" onclick="finishAndGoHome()">
          დასრულება და მთავარზე დაბრუნება
        </button>
      </div>
    </div>

    <script>
      let fullDatabase = [];
      let activeQuestions = [];
      let userAnswers = [];
      let currentIdx = 0;
      let globalStartIdx = 0;
      let totalPoints = 0;
      let currentGroupKey = ""; // ინახავს მიმდინარე ჯგუფის სახელს (g1, g2...)

      async function loadData() {
        try {
          const response = await fetch("questions.json");
          fullDatabase = await response.json();
          updateMenuScores();
        } catch (e) {
          alert("შეცდომა: questions.json ვერ მოიძებნა!");
        }
      }

      function updateMenuScores() {
        const groups = ["all", "g1", "g2", "g3", "g4", "g5", "g6", "g7"];
        groups.forEach((key) => {
          const saved = localStorage.getItem("psych_score_" + key);
          const element = document.getElementById("score-" + key);
          if (saved && element) {
            element.innerText = `ბოლო შედეგი: ${saved} ქულა`;
          }
        });
      }

      function startQuiz(start, end, groupKey) {
        if (fullDatabase.length === 0) return;

        currentGroupKey = groupKey;
        globalStartIdx = start;
        activeQuestions = fullDatabase.slice(start, end);
        userAnswers = new Array(activeQuestions.length).fill(null).map(() => ({
          selected: [],
          isChecked: false,
          isCorrect: false,
        }));

        currentIdx = 0;
        totalPoints = 0;

        document.getElementById("menu-ui").style.display = "none";
        document.getElementById("quiz-ui").style.display = "block";
        document.getElementById("result-ui").style.display = "none";
        renderQuestion();
      }

      function renderQuestion() {
        const data = activeQuestions[currentIdx];
        const userState = userAnswers[currentIdx];

        const localCurrent = currentIdx + 1;
        document.getElementById("local-progress").innerText =
          `${localCurrent} / ${activeQuestions.length}`;
        document.getElementById("global-progress").innerText =
          `${globalStartIdx + localCurrent} / ${globalStartIdx + activeQuestions.length}`;
        document.getElementById("current-points").innerText =
          totalPoints.toFixed(1);

        document.getElementById("q-text").innerText = data.q;
        const expBox = document.getElementById("explanation-box");
        const actionBtn = document.getElementById("action-btn");
        const prevBtn = document.getElementById("prev-btn");

        prevBtn.style.display = currentIdx > 0 ? "block" : "none";

        const box = document.getElementById("options-box");
        box.innerHTML = "";

        data.options.forEach((opt, i) => {
          const div = document.createElement("div");
          div.className = "option";
          if (userState.selected.includes(i)) div.classList.add("selected");

          if (userState.isChecked) {
            if (data.correct.includes(opt)) div.classList.add("correct");
            else if (userState.selected.includes(i)) div.classList.add("wrong");
          }

          div.innerHTML = `<div class="checkbox"></div> <span>${opt}</span>`;
          div.onclick = () => selectOption(i);
          box.appendChild(div);
        });

        if (userState.isChecked) {
          expBox.innerText = data.explain;
          expBox.style.display = "block";
          actionBtn.innerText =
            currentIdx === activeQuestions.length - 1
              ? "შედეგების ნახვა"
              : "შემდეგი კითხვა";
          actionBtn.disabled = false;
        } else {
          expBox.style.display = "none";
          actionBtn.innerText = "შემოწმება";
          actionBtn.disabled = userState.selected.length === 0;
        }
      }

      function selectOption(idx) {
        if (userAnswers[currentIdx].isChecked) return;
        const data = activeQuestions[currentIdx];
        const userState = userAnswers[currentIdx];
        const isMulti = data.correct.length > 1;

        if (isMulti) {
          const foundAt = userState.selected.indexOf(idx);
          if (foundAt > -1) userState.selected.splice(foundAt, 1);
          else userState.selected.push(idx);
        } else {
          userState.selected = [idx];
        }
        renderQuestion();
      }

      function handleAction() {
        const userState = userAnswers[currentIdx];
        if (!userState.isChecked) {
          checkAnswer();
        } else {
          nextQuestion();
        }
      }

      function checkAnswer() {
        const data = activeQuestions[currentIdx];
        const userState = userAnswers[currentIdx];

        const selectedTexts = userState.selected
          .map((i) => data.options[i])
          .sort();
        const correctTexts = [...data.correct].sort();

        userState.isCorrect =
          JSON.stringify(selectedTexts) === JSON.stringify(correctTexts);
        userState.isChecked = true;

        if (userState.isCorrect) totalPoints += 0.5;
        renderQuestion();
      }

      function nextQuestion() {
        if (currentIdx < activeQuestions.length - 1) {
          currentIdx++;
          renderQuestion();
        } else {
          showResults();
        }
      }

      function prevQuestion() {
        if (currentIdx > 0) {
          currentIdx--;
          renderQuestion();
        }
      }

      function showResults() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result-ui").style.display = "block";
        const maxPoints = activeQuestions.length * 0.5;
        document.getElementById("final-stats").innerText =
          `თქვენ დააგროვეთ ${totalPoints.toFixed(1)} ქულა ${maxPoints.toFixed(1)}-დან.`;

        // ქულის შენახვა localStorage-ში
        localStorage.setItem(
          "psych_score_" + currentGroupKey,
          totalPoints.toFixed(1),
        );
      }

      function finishAndGoHome() {
        updateMenuScores();
        document.getElementById("result-ui").style.display = "none";
        document.getElementById("menu-ui").style.display = "block";
      }

      loadData();
    </script>
  </body>
</html>

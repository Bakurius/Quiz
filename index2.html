<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ფსიქოლოგიის ტესტი - ჯგუფები</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f1a;
        --surface: #151827;
        --card: #1c2035;
        --border: #2a3050;
        --accent: #6c8bff;
        --correct: #22c55e;
        --wrong: #ef4444;
        --text: #e8eaf6;
        --muted: #7b82a8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Noto Sans Georgian", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 750px;
        background: var(--surface);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      /* Menu Styles */
      .menu-screen h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 1.8rem;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .full-width {
        grid-column: span 2;
      }
      .menu-btn {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 15px;
        border-radius: 12px;
        cursor: pointer;
        text-align: center;
        transition: all 0.3s;
      }
      .menu-btn:hover {
        border-color: var(--accent);
        background: rgba(108, 139, 255, 0.1);
      }
      .menu-btn h3 {
        margin-bottom: 5px;
        color: var(--accent);
        font-size: 1rem;
      }

      /* Quiz UI */
      .header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 600;
      }
      .question-text {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 25px;
        line-height: 1.5;
        min-height: 60px;
      }
      .options-grid {
        display: grid;
        gap: 10px;
      }
      .option {
        background: var(--card);
        border: 2px solid var(--border);
        padding: 14px 18px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.2s;
      }
      .option.selected {
        border-color: var(--accent);
        background: rgba(108, 139, 255, 0.08);
      }
      .option.correct {
        border-color: var(--correct);
        background: rgba(34, 197, 94, 0.15);
      }
      .option.wrong {
        border-color: var(--wrong);
        background: rgba(239, 68, 68, 0.15);
      }

      .checkbox {
        width: 18px;
        height: 18px;
        border: 2px solid var(--muted);
        border-radius: 4px;
        flex-shrink: 0;
      }
      .selected .checkbox {
        background: var(--accent);
        border-color: var(--accent);
      }

      .btn-container {
        margin-top: 25px;
      }
      button.main-btn {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .explain {
        margin-top: 15px;
        padding: 15px;
        background: rgba(108, 139, 255, 0.05);
        border-left: 4px solid var(--accent);
        border-radius: 4px;
        font-size: 0.9rem;
        display: none;
        line-height: 1.4;
      }

      @media (max-width: 500px) {
        .menu-grid {
          grid-template-columns: 1fr;
        }
        .full-width {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="menu-ui" class="menu-screen">
        <h1>ფსიქოლოგიის ტესტი</h1>
        <div class="menu-grid">
          <button
            class="menu-btn full-width"
            onclick="startQuiz(0, 250, 'სრული ტესტი')"
          >
            <h3>სრული ტესტი</h3>
            <p>1 - 250 კითხვა</p>
          </button>
          <button class="menu-btn" onclick="startQuiz(0, 40, 'ჯგუფი 1')">
            <h3>ჯგუფი 1</h3>
            <p>1 - 40</p>
          </button>
          <button class="menu-btn" onclick="startQuiz(40, 80, 'ჯგუფი 2')">
            <h3>ჯგუფი 2</h3>
            <p>41 - 80</p>
          </button>
          <button class="menu-btn" onclick="startQuiz(80, 120, 'ჯგუფი 3')">
            <h3>ჯგუფი 3</h3>
            <p>81 - 120</p>
          </button>
          <button class="menu-btn" onclick="startQuiz(120, 160, 'ჯგუფი 4')">
            <h3>ჯგუფი 4</h3>
            <p>121 - 160</p>
          </button>
          <button class="menu-btn" onclick="startQuiz(160, 200, 'ჯგუფი 5')">
            <h3>ჯგუფი 5</h3>
            <p>161 - 200</p>
          </button>
          <button class="menu-btn" onclick="startQuiz(200, 240, 'ჯგუფი 6')">
            <h3>ჯგუფი 6</h3>
            <p>201 - 240</p>
          </button>
          <button class="menu-btn" onclick="startQuiz(240, 250, 'ჯგუფი 7')">
            <h3>ჯგუფი 7</h3>
            <p>241 - 250</p>
          </button>
        </div>
      </div>

      <div id="quiz-ui" style="display: none">
        <div class="header">
          <span id="local-progress"></span>
          <span id="global-progress"></span>
        </div>
        <div class="question-text" id="q-text"></div>
        <div class="options-grid" id="options-box"></div>
        <div id="explanation-box" class="explain"></div>
        <div class="btn-container">
          <button
            id="action-btn"
            class="main-btn"
            onclick="handleAction()"
            disabled
          >
            აირჩიეთ პასუხი
          </button>
        </div>
      </div>

      <div id="result-ui" style="display: none; text-align: center">
        <h2 style="font-size: 1.8rem; margin-bottom: 10px">დასრულდა!</h2>
        <p
          id="final-stats"
          style="font-size: 1.1rem; color: var(--muted); margin-bottom: 20px"
        ></p>
        <button class="main-btn" onclick="location.reload()">
          მთავარ მენიუში დაბრუნება
        </button>
      </div>
    </div>

    <script>
      let fullDatabase = [];
      let activeQuestions = [];
      let currentIdx = 0; // ინდექსი activeQuestions-ში
      let globalStartIdx = 0; // საწყისი ინდექსი სრულ ბაზაში
      let points = 0;
      let selectedIndices = [];
      let isChecked = false;

      async function loadData() {
        try {
          const response = await fetch("questions.json");
          fullDatabase = await response.json();
        } catch (e) {
          alert("შეცდომა: questions.json ვერ მოიძებნა!");
        }
      }

      function startQuiz(start, end, title) {
        if (fullDatabase.length === 0) return;

        globalStartIdx = start;
        activeQuestions = fullDatabase.slice(start, end);
        currentIdx = 0;
        points = 0;

        document.getElementById("menu-ui").style.display = "none";
        document.getElementById("quiz-ui").style.display = "block";
        renderQuestion();
      }

      function renderQuestion() {
        const data = activeQuestions[currentIdx];
        isChecked = false;
        selectedIndices = [];

        // ნუმერაციის ლოგიკა
        const localCurrent = currentIdx + 1;
        const localTotal = activeQuestions.length;
        const globalCurrent = globalStartIdx + localCurrent;
        const globalTotal = globalStartIdx + localTotal;

        document.getElementById("local-progress").innerText =
          `${localCurrent} / ${localTotal}`;
        document.getElementById("global-progress").innerText =
          `${globalCurrent} / ${globalTotal}`;

        document.getElementById("q-text").innerText = data.q;
        document.getElementById("explanation-box").style.display = "none";

        const actionBtn = document.getElementById("action-btn");
        actionBtn.innerText = "შემოწმება";
        actionBtn.disabled = true;

        const box = document.getElementById("options-box");
        box.innerHTML = "";

        data.options.forEach((opt, i) => {
          const div = document.createElement("div");
          div.className = "option";
          div.innerHTML = `<div class="checkbox"></div> <span>${opt}</span>`;
          div.onclick = () => selectOption(i);
          box.appendChild(div);
        });
      }

      function selectOption(idx) {
        if (isChecked) return;
        const data = activeQuestions[currentIdx];
        const isMulti = data.correct.length > 1;

        if (isMulti) {
          const foundAt = selectedIndices.indexOf(idx);
          if (foundAt > -1) selectedIndices.splice(foundAt, 1);
          else selectedIndices.push(idx);
        } else {
          selectedIndices = [idx];
        }

        document.querySelectorAll(".option").forEach((opt, i) => {
          opt.classList.toggle("selected", selectedIndices.includes(i));
        });
        document.getElementById("action-btn").disabled =
          selectedIndices.length === 0;
      }

      function handleAction() {
        if (!isChecked) checkAnswer();
        else nextQuestion();
      }

      function checkAnswer() {
        isChecked = true;
        const data = activeQuestions[currentIdx];
        const options = document.querySelectorAll(".option");

        const selectedTexts = selectedIndices
          .map((i) => data.options[i])
          .sort();
        const correctTexts = [...data.correct].sort();

        const isCorrect =
          JSON.stringify(selectedTexts) === JSON.stringify(correctTexts);
        if (isCorrect) points++;

        options.forEach((opt, i) => {
          const txt = data.options[i];
          opt.classList.remove("selected");
          if (data.correct.includes(txt)) opt.classList.add("correct");
          else if (selectedIndices.includes(i)) opt.classList.add("wrong");
        });

        const expBox = document.getElementById("explanation-box");
        expBox.innerText = data.explain;
        expBox.style.display = "block";
        document.getElementById("action-btn").innerText = "შემდეგი კითხვა";
      }

      function nextQuestion() {
        currentIdx++;
        if (currentIdx < activeQuestions.length) renderQuestion();
        else showResults();
      }

      function showResults() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result-ui").style.display = "block";
        document.getElementById("final-stats").innerText =
          `თქვენ უპასუხეთ ${points} კითხვას ${activeQuestions.length}-დან.`;
      }

      loadData();
    </script>
  </body>
</html>
